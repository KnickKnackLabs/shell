[settings]
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
"github:KnickKnackLabs/zmx" = "0.4.2-kkl.3"
"shiv:codebase" = "0.2.0"
usage = "latest"
jq = "1.8.1"
bats = "1.13.0"

[_.codebase]
lint = ["mise-settings", "bats-test-helper", "bats-test-task", "mcr-scope", "or-true", "shellcheck"]
